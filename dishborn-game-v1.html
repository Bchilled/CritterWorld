    px(ctx,hx+hw-2,hy-1,dark); px(ctx,hx+hw-3,hy-2,dark); // right tuft
    // Small beak center
    rect(ctx,hx+Math.round(hw/2)-1,hy+Math.round(hh*0.5),3,2,"#ef6c00");
  } else if(headType==="parrot"){
    // Curved hooked beak
    rect(ctx,hx+Math.round(hw*0.2),hy+Math.round(hh*0.4),Math.round(hw*0.5),2,"#ef6c00");
    for(let i=0;i<3;i++) px(ctx,hx+Math.round(hw*0.65)+i,hy+Math.round(hh*0.4)+i,"#e65100");
    // Cheek patch
    px(ctx,hx+2,hy+Math.round(hh*0.5),light);
  } else if(headType==="snake"){
    // Flat triangular — wide at back, pointed at front
    for(let j=0;j<hh;j++){
      const taper=Math.round((1-j/hh)*hw*0.3);
      rect(ctx,hx+taper,hy+j,Math.max(2,hw-taper*2),1,j===Math.round(hh*0.5)?dark:col);
    }
    // Forked tongue
    if(Math.sin(t*0.12)>0.3){
      px(ctx,hx+2,hy+hh,"#f44336"); px(ctx,hx+1,hy+hh+1,"#f44336"); px(ctx,hx+3,hy+hh+1,"#f44336");
    }
  } else if(headType==="gorilla"){
    // Big brow ridge, wide nostrils
    rect(ctx,hx,hy,hw,3,dark); // brow shelf
    rect(ctx,hx+Math.round(hw*0.15),hy+Math.round(hh*0.5),Math.round(hw*0.7),Math.round(hh*0.4),dark);
    px(ctx,hx+Math.round(hw*0.3),hy+Math.round(hh*0.55),dark); px(ctx,hx+Math.round(hw*0.6),hy+Math.round(hh*0.55),dark);
  } else if(headType==="elephant"){
    // Wide head, trunk base
    rect(ctx,hx+Math.round(hw*0.3),hy+Math.round(hh*0.5),Math.round(hw*0.4),Math.round(hh*0.45),dark);
  } else if(headType==="rhino"){
    // Broad armored head
    rect(ctx,hx,hy,hw,2,dark); rect(ctx,hx,hy+2,hw,1,acc); // armor plates
    // Horn
    for(let i=0;i<5;i++) px(ctx,hx+Math.round(hw*0.35)+Math.round(i*0.2),hy-1-i,dark);
  } else if(headType==="hippo"){
    // Very wide jaw
    rect(ctx,hx,hy+Math.round(hh*0.4),hw,Math.round(hh*0.55),dark);
    rect(ctx,hx+1,hy+Math.round(hh*0.45),hw-2,Math.round(hh*0.45),col);
    // Nostrils on top
    px(ctx,hx+Math.round(hw*0.35),hy+2,dark); px(ctx,hx+Math.round(hw*0.6),hy+2,dark);
  } else if(headType==="bat"){
    // Big ears built into head
    rect(ctx,hx-2,hy-4,3,5,dark); rect(ctx,hx-1,hy-3,2,4,col); // left ear
    rect(ctx,hx+hw-1,hy-4,3,5,dark); rect(ctx,hx+hw,hy-3,2,4,col); // right ear
    // Flat nose
    px(ctx,hx+Math.round(hw/2)-1,hy+Math.round(hh*0.4),dark); px(ctx,hx+Math.round(hw/2)+1,hy+Math.round(hh*0.4),dark);
  } else if(headType==="fox"){
    // Pointed snout, wide cheeks
    rect(ctx,hx+Math.round(hw*0.1),hy+Math.round(hh*0.3),Math.round(hw*0.8),Math.round(hh*0.65),col);
    for(let i=0;i<4;i++) px(ctx,hx+Math.round(hw/2)-Math.round(i*0.3),hy+Math.round(hh*0.3)+i,dark); // pointed tip
  } else if(headType==="raccoon"){
    // Mask pattern
    rect(ctx,hx+1,hy+1,hw-2,Math.round(hh*0.45),dark); // mask
    rect(ctx,hx+2,hy+2,hw-4,Math.round(hh*0.35),col);   // mask inner
    px(ctx,hx+Math.round(hw/2),hy+Math.round(hh*0.5),dark); // nose
  } else if(headType==="panda"){
    // Eye patches
    rect(ctx,hx+1,hy+1,Math.round(hw*0.35),Math.round(hh*0.45),dark); // left patch
    rect(ctx,hx+hw-Math.round(hw*0.35)-1,hy+1,Math.round(hw*0.35),Math.round(hh*0.45),dark); // right patch
    // Wide round snout
    rect(ctx,hx+Math.round(hw*0.2),hy+Math.round(hh*0.5),Math.round(hw*0.6),Math.round(hh*0.4),dark);
    rect(ctx,hx+Math.round(hw*0.25),hy+Math.round(hh*0.55),Math.round(hw*0.5),Math.round(hh*0.3),col);
  }

  rect(ctx,hx,hy,hw,hh,col);
  rect(ctx,hx+1,hy+1,hw-2,1,light);
  rect(ctx,hx,hy+hh-Math.max(1,Math.round(2*sc)),hw,Math.max(1,Math.round(2*sc)),dark);
  if(p.accent) rect(ctx,hx+1,hy+Math.round(hh*0.5),hw-2,Math.max(1,Math.round(hh*0.18)),p.accent);

  // ── EXTRAS (drawn on top of head/body) ───────────────────────────────────
  if(isAdult||isElder) (extras||[]).forEach(e => drawExtra(ctx, e, hx, hy, hw, hh, bx, by, bw, bh, sc, frame, p));

  // ── ANIMAL HORNS — adult/elder only
  if(isAdult||isElder) drawHorns(ctx, hornType, hx, hy, hw, hh, t, p);

  // ── ANIMAL EARS — teen+ only
  if(!isBaby) drawEars(ctx, earType, hx, hy, hw, hh, t, p);

  // ── EYES ─────────────────────────────────────────────────────────────────
  const poopSqueeze=action==="poop"&&((t*(1/5.0))%1)<0.5;
  const blink=!dead&&!sleeping&&!poopSqueeze&&Math.sin(t*2.4)>-0.98;
  // Baby: override eye style to simple beady. Teen: allow beady/big/wide only
  const effectiveEyeStyle = isBaby ? "beady" : isTeen && !["beady","big","wide","sleepy"].includes(eyeStyle) ? "beady" : eyeStyle;
  // Baby: only smile mouth. Teen: no complex mouths
  const effectiveMouthStyle = isBaby ? "smile" : isTeen && ["lamprey","proboscis","tusk_grin","horse_lip","bear_snout"].includes(mouthStyle) ? "smile" : mouthStyle;
  const ey=hy+Math.max(1,Math.round(2*sc)), ew=Math.max(1,Math.round(2*sc));
  if(effectiveEyeStyle==="cyclops"){
    rect(ctx,hx+Math.round(hw/2)-ew,ey,ew*2,blink?ew*2:1,p.eye);
    if(blink) px(ctx,hx+Math.round(hw/2),ey+1,p.pupil);
  } else if(effectiveEyeStyle==="big"){
    rect(ctx,hx+1,ey,ew+1,blink?ew+1:1,p.eye); rect(ctx,hx+hw-ew-2,ey,ew+1,blink?ew+1:1,p.eye);
    if(blink){ px(ctx,hx+2,ey+1,p.pupil); px(ctx,hx+hw-ew-1,ey+1,p.pupil); }
  } else if(effectiveEyeStyle==="beady"){
    if(blink){ px(ctx,hx+2,ey,p.pupil); px(ctx,hx+hw-3,ey,p.pupil); }
  } else if(effectiveEyeStyle==="compound"){
    rect(ctx,hx+1,ey,ew+1,blink?ew:1,p.eye); rect(ctx,hx+hw-ew-2,ey,ew+1,blink?ew:1,p.eye);
    if(blink){ px(ctx,hx+1,ey,p.pupil); px(ctx,hx+2,ey,p.pupil); px(ctx,hx+hw-ew-2,ey,p.pupil); px(ctx,hx+hw-ew-1,ey,p.pupil); }
  } else if(effectiveEyeStyle==="sleepy"){
    rect(ctx,hx+1,ey,ew+1,1,dark); rect(ctx,hx+hw-ew-2,ey,ew+1,1,dark);
  } else if(effectiveEyeStyle==="angry"){
    if(blink){ px(ctx,hx+2,ey+1,p.pupil); px(ctx,hx+hw-3,ey+1,p.pupil); }
    rect(ctx,hx+1,ey,ew+1,1,dark); rect(ctx,hx+hw-ew-2,ey,ew+1,1,dark);
  } else if(effectiveEyeStyle==="wide"){
    rect(ctx,hx+1,ey-1,ew+2,blink?ew+2:1,p.eye); rect(ctx,hx+hw-ew-3,ey-1,ew+2,blink?ew+2:1,p.eye);
    if(blink){ rect(ctx,hx+2,ey,ew,ew,p.pupil); rect(ctx,hx+hw-ew-2,ey,ew,ew,p.pupil); }
  } else if(effectiveEyeStyle==="swirl"){
    if(blink){
      px(ctx,hx+2,ey,p.eye); px(ctx,hx+3,ey+1,p.pupil); px(ctx,hx+2,ey+2,p.eye);
      px(ctx,hx+hw-3,ey,p.eye); px(ctx,hx+hw-4,ey+1,p.pupil); px(ctx,hx+hw-3,ey+2,p.eye);
    }
  } else if(effectiveEyeStyle==="line"){
    rect(ctx,hx+1,ey,ew+2,1,dark); rect(ctx,hx+hw-ew-3,ey,ew+2,1,dark);
  } else if(effectiveEyeStyle==="stacked"){
    if(blink){ px(ctx,hx+2,ey,p.pupil); px(ctx,hx+2,ey+2,p.eye); px(ctx,hx+hw-3,ey,p.pupil); px(ctx,hx+hw-3,ey+2,p.eye); }
  } else if(effectiveEyeStyle==="stalked"){
    for(let j=0;j<3;j++){ px(ctx,hx+2,hy-j,dark); px(ctx,hx+hw-3,hy-j,dark); }
    px(ctx,hx+2,hy-3,p.eye); px(ctx,hx+hw-3,hy-3,p.eye);
  } else if(effectiveEyeStyle==="three"){
    if(blink){ px(ctx,hx+2,ey,p.pupil); px(ctx,hx+Math.round(hw/2),ey-1,p.pupil); px(ctx,hx+hw-3,ey,p.pupil); }
  } else if(effectiveEyeStyle==="no_eyes"){
    // creepy blank
  } else if(effectiveEyeStyle==="cat_slit"){
    rect(ctx,hx+1,ey,ew+1,blink?ew+1:1,p.eye); rect(ctx,hx+hw-ew-2,ey,ew+1,blink?ew+1:1,p.eye);
    if(blink){ px(ctx,hx+2,ey,p.pupil); px(ctx,hx+2,ey+ew,p.pupil); px(ctx,hx+hw-3,ey,p.pupil); px(ctx,hx+hw-3,ey+ew,p.pupil); }
  } else if(effectiveEyeStyle==="goat_rect"){
    // Horizontal rectangular pupil
    rect(ctx,hx+1,ey,ew+1,blink?ew+1:1,p.eye); rect(ctx,hx+hw-ew-2,ey,ew+1,blink?ew+1:1,p.eye);
    if(blink){ rect(ctx,hx+1,ey+1,ew+1,1,p.pupil); rect(ctx,hx+hw-ew-2,ey+1,ew+1,1,p.pupil); }
  } else if(effectiveEyeStyle==="snake_slit"){
    px(ctx,hx+3,ey,p.eye); px(ctx,hx+hw-4,ey,p.eye);
    if(blink){ px(ctx,hx+3,ey,p.pupil); px(ctx,hx+hw-4,ey,p.pupil); }
  } else if(effectiveEyeStyle==="bug_dome"){
    rect(ctx,hx,ey-1,ew+2,blink?ew+3:1,p.eye); rect(ctx,hx+hw-ew-2,ey-1,ew+2,blink?ew+3:1,p.eye);
    if(blink){ for(let i=0;i<3;i++) for(let j=0;j<3;j++) px(ctx,hx+i,ey+j,i===j?p.pupil:p.eye); }
  } else if(effectiveEyeStyle==="bird_side"){
    // Eyes on sides of head
    px(ctx,hx,ey,p.eye); px(ctx,hx+hw-1,ey,p.eye);
    if(blink){ px(ctx,hx,ey,p.pupil); px(ctx,hx+hw-1,ey,p.pupil); }
  }

  if(sleeping){ px(ctx,hx+hw,hy-1,"#b39ddb"); px(ctx,hx+hw+1,hy-2,"#7e57c2"); px(ctx,hx+hw+2,hy-3,"#4527a0"); }

  // ── MOUTH ────────────────────────────────────────────────────────────────
  if(!sleeping){
    const chomp=["eat","drink","cook","attack"].includes(action)&&Math.sin(t*0.2)>0;
    const my=hy+hh-Math.max(2,Math.round(3*sc));
    if(effectiveMouthStyle==="smile"){ px(ctx,hx+1,my+1,dark); rect(ctx,hx+2,my+2,hw-4,1,dark); px(ctx,hx+hw-2,my+1,dark); }
    else if(effectiveMouthStyle==="frown"){ px(ctx,hx+1,my+2,dark); rect(ctx,hx+2,my+1,hw-4,1,dark); px(ctx,hx+hw-2,my+2,dark); }
    else if(effectiveMouthStyle==="fangs"){ rect(ctx,hx+1,my+1,hw-2,1,dark); px(ctx,hx+2,my+2,p.eye); px(ctx,hx+hw-3,my+2,p.eye); }
    else if(effectiveMouthStyle==="beak"||effectiveMouthStyle==="beak_open"){
      const open=effectiveMouthStyle==="beak_open"||chomp;
      rect(ctx,hx+Math.round(hw*0.25),my,Math.round(hw*0.5),2,"#f9a825");
      if(open) rect(ctx,hx+Math.round(hw*0.25),my+2,Math.round(hw*0.5),1,"#222");
    } else if(effectiveMouthStyle==="big"){
      rect(ctx,hx+1,my,hw-2,chomp?3:2,dark);
      if(chomp){ px(ctx,hx+2,my,p.eye); px(ctx,hx+hw-3,my,p.eye); }
    } else if(effectiveMouthStyle==="zigzag"){ for(let i=0;i<hw-2;i++) px(ctx,hx+1+i,my+(i%2),dark); }
    else if(effectiveMouthStyle==="proboscis"){ rect(ctx,hx+Math.round(hw/2)-1,my,2,4,dark); }
    else if(effectiveMouthStyle==="lamprey"){
      rect(ctx,hx+2,my-1,hw-4,3,dark);
      for(let i=0;i<hw-4;i+=2) px(ctx,hx+2+i,my,acc);
    } else if(effectiveMouthStyle==="tusk_grin"){
      px(ctx,hx+1,my+1,dark); rect(ctx,hx+2,my+2,hw-4,1,dark); px(ctx,hx+hw-2,my+1,dark);
      rect(ctx,hx+2,my+2,2,3,light); rect(ctx,hx+hw-4,my+2,2,3,light);
    } else if(effectiveMouthStyle==="sideways"){
      rect(ctx,hx+Math.round(hw*0.6),my-1,2,hh-my+hy+2,dark);
    } else if(effectiveMouthStyle==="horse_lip"){
      rect(ctx,hx+Math.round(hw*0.2),my,Math.round(hw*0.6),2,col);
      rect(ctx,hx+Math.round(hw*0.25),my+2,Math.round(hw*0.5),1,dark);
      if(chomp) rect(ctx,hx+Math.round(hw*0.2),my+2,Math.round(hw*0.6),2,dark);
    } else if(effectiveMouthStyle==="dog_pant"){
      rect(ctx,hx+1,my,hw-2,2,dark);
      if(chomp||Math.sin(t*1.5)>0){ // panting tongue
        rect(ctx,hx+Math.round(hw*0.3),my+2,Math.round(hw*0.4),3,"#f48fb1");
        px(ctx,hx+Math.round(hw/2),my+4,"#e91e63");
      }
    } else if(effectiveMouthStyle==="duck_bill"){
      rect(ctx,hx+Math.round(hw*0.15),my,Math.round(hw*0.7),2,"#f9a825");
      rect(ctx,hx+Math.round(hw*0.15),my+2,Math.round(hw*0.7),2,"#ef6c00");
    } else if(effectiveMouthStyle==="elephant_mouth"){
      // Small mouth below trunk area
      rect(ctx,hx+Math.round(hw*0.3),my+1,Math.round(hw*0.4),1,dark);

      // Round O mouth
      rect(ctx,hx+Math.round(hw*0.3),my,Math.round(hw*0.4),1,dark);
      rect(ctx,hx+Math.round(hw*0.3),my+2,Math.round(hw*0.4),1,dark);
      px(ctx,hx+Math.round(hw*0.25),my+1,dark); px(ctx,hx+Math.round(hw*0.7),my+1,dark);
    } else if(effectiveMouthStyle==="beak_hook"){
      rect(ctx,hx+Math.round(hw*0.2),my,Math.round(hw*0.6),2,"#ef6c00");
      for(let i=0;i<3;i++) px(ctx,hx+Math.round(hw*0.75)+i,my+1+i,"#e65100");
    } else if(effectiveMouthStyle==="frog_wide"){
      rect(ctx,hx,my,hw,2,dark);
      if(chomp) rect(ctx,hx+1,my+2,hw-2,2,col);
    } else if(effectiveMouthStyle==="cat_whisker"){
      px(ctx,hx+Math.round(hw/2)-1,my,dark); px(ctx,hx+Math.round(hw/2)+1,my,dark);
      for(let i=0;i<4;i++){ px(ctx,hx-1-i,my+1,dark); px(ctx,hx+hw+i,my+1,dark); }
    } else if(effectiveMouthStyle==="bear_snout"){
      rect(ctx,hx+Math.round(hw*0.2),my,Math.round(hw*0.6),2,col);
      px(ctx,hx+Math.round(hw/2)-1,my-1,dark); px(ctx,hx+Math.round(hw/2)+1,my-1,dark);
      rect(ctx,hx+Math.round(hw*0.3),my+2,Math.round(hw*0.4),1,dark);
    }
  }

  // ── ANIMAL SNOUTS — adult/elder only
  if(isAdult||isElder) drawSnout(ctx, snoutType, hx, hy, hw, hh, t, p);

  // ── ANIMAL FEET — teen+ only
  if(!isBaby) drawFeet(ctx, feetType, bx, by, bw, bh, sc, t, p);

  // ── BODY PATTERN — adult/elder only
  if(isAdult||isElder) drawPattern(ctx, patternType, bx, by, bw, bh, t, p);

  // ── TOOLS ────────────────────────────────────────────────────────────────
  const toolX=Math.round(bx+bw+1), toolY=Math.round(by+2+bobY), aS=Math.round(armSwing);

  if(action==="chop"){
    // Axe: long handle, heavy head, sparks on impact
    const chopPhase=(t*1/2.5)%1;
    const axH=toolY+Math.max(-6,Math.min(6,aS));
    rect(ctx,toolX+1,axH,2,8,"#795548");           // handle
    rect(ctx,toolX-1,axH,6,3,"#78909c");            // axe head wide
    rect(ctx,toolX-2,axH+1,2,4,"#90a4ae");          // blade
    px(ctx,toolX-2,axH,"#cfd8dc");                  // blade glint
    if(chopPhase>0.73&&chopPhase<0.82){             // impact sparks
      px(ctx,toolX-3,axH+4,"#ffeb3b"); px(ctx,toolX-4,axH+3,"#ff8f00");
      px(ctx,toolX-2,axH+5,"#fff176");
    }
  } else if(action==="mine"){
    // Pickaxe: proper cross shape, sparks on rock impact
    const minePhase=(t*1/2.5)%1;
    const pickH=toolY+Math.max(-8,Math.min(8,aS));
    rect(ctx,toolX,pickH+2,2,7,"#795548");           // handle
    rect(ctx,toolX-3,pickH,8,2,"#78909c");           // pick bar horizontal
    rect(ctx,toolX-3,pickH,3,1,"#90a4ae");           // left pick point
    rect(ctx,toolX+4,pickH+1,3,1,"#90a4ae");         // right pick point
    px(ctx,toolX-4,pickH,"#cfd8dc"); px(ctx,toolX+6,pickH+1,"#cfd8dc"); // glints
    if(minePhase>0.88&&minePhase<0.97){
      px(ctx,toolX-4,pickH+2,"#ffeb3b"); px(ctx,toolX-5,pickH+1,"#ff8f00");
      px(ctx,toolX-3,pickH+3,"#fff176"); px(ctx,toolX-5,pickH+3,"#ffb300");
    }
  } else if(action==="fish"){
    // Proper fishing rod: long pole at angle, line dropping to water, float bob
    const fishPhase=(t*1/2.5)%1;
    const lineY=by+bh+3+Math.round(Math.sin(t*1.5)*2); // water level
    // Rod — long diagonal pole
    for(let i=0;i<10;i++) px(ctx,toolX+Math.round(i*0.4),toolY-Math.round(i*0.7)+aS,"#795548");

    // Float — red/white bobber at water line
    const floatBob=Math.round(Math.sin(t*0.12)*1);
    rect(ctx,tipX-1,lineY-1+floatBob,3,2,"#f44336"); // red top
    rect(ctx,tipX-1,lineY+1+floatBob,3,2,"#eeeeee"); // white bottom
    // Fish tug sometimes
    if(Math.sin(t*1.2)>0.85){ px(ctx,tipX-2,lineY+3,"#ef9a9a"); px(ctx,tipX+2,lineY+4,"#ef9a9a"); }
  } else if(action==="build"){
    // Hammer — proper T shape
    const buildPhase=(t*1/3.0)%1;
    rect(ctx,toolX,toolY+aS,2,7,"#795548");         // handle
    rect(ctx,toolX-2,toolY+aS,6,3,"#ffb74d");       // hammer head
    rect(ctx,toolX-2,toolY+aS,2,4,"#ffa000");       // face side
    if(buildPhase>0.52&&buildPhase<0.68){
      px(ctx,toolX-2,toolY+aS+3,"#ffe082");          // impact flash
    }
  } else if(action==="smith"){
    // Blacksmith hammer hitting anvil — anvil visible below
    const smithPhase=(t*1/2.5)%1;
    const hamH=toolY+Math.max(-2,Math.min(6,aS));
    rect(ctx,toolX,hamH,2,6,"#795548");             // handle
    rect(ctx,toolX-2,hamH,6,3,"#546e7a");           // hammer head
    px(ctx,toolX-2,hamH,"#78909c"); px(ctx,toolX+3,hamH,"#78909c"); // glints
    // Anvil below
    rect(ctx,toolX-3,by+bh+2,9,3,"#455a64");
    rect(ctx,toolX-2,by+bh+1,7,2,"#546e7a");
    if(smithPhase>0.52&&smithPhase<0.65){
      px(ctx,toolX-1,hamH+3,"#ffeb3b"); px(ctx,toolX+1,hamH+3,"#ff8f00"); // sparks
      px(ctx,toolX,hamH+4,"#fff176");
    }
  } else if(action==="eat"){
    // Big chunky food item — clear leg of meat/food raised to mouth level
    const eatPhase=(t*1/4.0)%1;
    const chomp=eatPhase>0.3&&eatPhase<0.7;
    const foodY=toolY+aS; // follows arm up to mouth
    rect(ctx,toolX,foodY,4,6,"#ef9a9a");            // food item
    rect(ctx,toolX+1,foodY-1,2,2,"#a5d6a7");        // vegetable bit on top
    rect(ctx,toolX-1,foodY+5,6,2,"#795548");        // bone/handle
    if(chomp){
      px(ctx,toolX,foodY,"#e57373"); // bite mark
      px(ctx,toolX+1,foodY,"#e57373");
    }
  } else if(action==="drink"){
    // Big cup/mug being tipped — clearly a drink
    const drinkPhase=(t*1/3.0)%1;
    const tilt=drinkPhase>0.2&&drinkPhase<0.65?1:0;
    const cupY=toolY+aS;
    rect(ctx,toolX,cupY,5,6,"#78909c");             // mug body
    rect(ctx,toolX+5,cupY+1,2,3,"#90a4ae");        // handle
    rect(ctx,toolX+1,cupY+1,3,1,"#b3e5fc");        // liquid inside
    if(tilt){
      px(ctx,toolX+2,cupY-1,"#b3e5fc");            // liquid dripping as tipping
      px(ctx,toolX+3,cupY-2,"#90caf9");
    }
    rect(ctx,toolX,cupY,5,1,"#90a4ae");             // rim
  } else if(action==="cook"){
    // Cooking pot on fire with stirring spoon — much clearer
    const cookPhase=(t*1/3.0)%1;
    // Pot sitting in front of creature
    const potX=bx-4, potY=by+bh-3;
    rect(ctx,potX,potY,9,6,"#546e7a");              // pot body
    rect(ctx,potX-1,potY,11,2,"#607d8b");           // pot rim
    rect(ctx,potX+1,potY+2,7,3,"#b3e5fc");         // liquid inside
    // Bubbles
    if(Math.sin(t*0.2)>0.4) px(ctx,potX+2,potY+1,"#b3e5fc");
    if(Math.sin(t*0.2+1)>0.5) px(ctx,potX+5,potY+1,"#90caf9");
    // Fire underneath
    px(ctx,potX+1,potY+6,"#ff8f00"); px(ctx,potX+3,potY+6,"#ff8f00");
    px(ctx,potX+5,potY+6,"#ff8f00"); px(ctx,potX+2,potY+7,"#ffb300");
    px(ctx,potX+4,potY+7,"#ffb300");
    // Spoon — arm holds it over pot
    rect(ctx,toolX,toolY+aS,1,5,"#795548");         // spoon handle
    rect(ctx,toolX-1,toolY+aS+4,3,2,"#a1887f");    // spoon bowl
  } else if(action==="gather"){
    // Plant/mushroom/berry on ground — creature bends to pick it
    const gatherPhase=(t*1/3.0)%1;
    const groundY=by+bh+2;
    const reaching=gatherPhase>0.2&&gatherPhase<0.65;
    // Item on ground
    rect(ctx,bx-3,groundY,3,3,"#66bb6a");           // green plant
    px(ctx,bx-2,groundY-1,"#81c784");              // leaf
    px(ctx,bx-1,groundY-2,"#388e3c");
    rect(ctx,bx-4,groundY+2,2,2,"#ef9a9a");        // berry
    px(ctx,bx-3,groundY+1,"#e91e63");
    // Only show item being held when standing back up (picked!)
    if(!reaching&&gatherPhase>0.65){
      px(ctx,toolX,toolY+aS,"#66bb6a");             // item in hand
      px(ctx,toolX+1,toolY+aS,"#81c784");
    }
  } else if(action==="pump"){
    rect(ctx,toolX,toolY,2,10,"#546e7a");
    rect(ctx,toolX-2,toolY+Math.round(bobY)+4,6,3,"#90a4ae");
    rect(ctx,toolX-1,by+bh+2,4,3,"#37474f");       // pump base
  } else if(action==="hunt"){
    // Arrow/bow
    for(let i=0;i<8;i++) px(ctx,toolX+i,toolY+aS-Math.round(i*0.5),"#795548");
    px(ctx,toolX+8,toolY+aS-4,"#ef9a9a");           // arrowhead
    px(ctx,toolX,toolY+aS+1,"#a5d6a7");             // fletching
  } else if(action==="carry"){
    rect(ctx,bx+1,by-5,bw-2,5,"#ff8f00");
    rect(ctx,bx+2,by-4,bw-4,3,"#ffa000");
    px(ctx,bx+1,by-5,"#795548"); px(ctx,bx+bw-2,by-5,"#795548"); // handles
  } else if(action==="attack"){
    rect(ctx,toolX,toolY+aS,1,9,"#78909c");
    rect(ctx,toolX-1,toolY+aS,3,2,"#cfd8dc");
    px(ctx,toolX,toolY+aS,"#fff"); // glint
  } else if(action==="poop"){
    // Poop drop — appears at end of squeeze phase
    const poopPhase=(t*1/5.0)%1;
    if(poopPhase>0.5){
      const dropDist=Math.round((poopPhase-0.5)/0.5*6);
      rect(ctx,bx+Math.round(bw/2)-1,by+bh+dropDist,4,4,"#5d4037");
      rect(ctx,bx+Math.round(bw/2),by+bh-1+dropDist,2,3,"#6d4c41");
      px(ctx,bx+Math.round(bw/2)+1,by+bh-2+dropDist,"#795548");
      // Stink lines
      if(dropDist>3){
        px(ctx,bx+Math.round(bw/2)-2,by+bh+2,"#c8e6c9");
        px(ctx,bx+Math.round(bw/2)+3,by+bh+1,"#c8e6c9");
      }
    }
    // Squeeze eyes shut — done in eye section via poopPhase
  } else if(action==="dance"){
    // Musical notes flying off while dancing
    const dp=(t/2.5)%1;
    if(dp<0.5){ px(ctx,bx+bw+2,by-Math.round(dp*8),"#e91e63"); px(ctx,bx+bw+3,by-Math.round(dp*8)-1,"#e91e63"); }
    if(dp>0.25&&dp<0.75){ px(ctx,bx-3,by-Math.round((dp-0.25)*8),"#9c27b0"); }
    if(dp>0.5){ px(ctx,bx+bw+1,by-Math.round((dp-0.5)*8),"#f48fb1"); }
  }

  // ── DEATH — grey out, X eyes, no movement ────────────────────────────────
  if(dead){
    // Desaturate to grey — overlay white then grey
    const greyAmt=Math.min(t*0.9,0.75);
    ctx.fillStyle=`rgba(200,200,200,${greyAmt})`; ctx.fillRect(0,0,W*SC,H*SC);
    // X eyes
    const exEy=hy+Math.max(1,Math.round(2*sc));
    [hx+2,hx+hw-4].forEach(ex=>{
      px(ctx,ex,  exEy,  "#333"); px(ctx,ex+1,exEy+1,"#333");
      px(ctx,ex+1,exEy,  "#333"); px(ctx,ex,  exEy+1,"#333");
    });
  }
  // ── ELDER — hunched look, wrinkle marks, grey tint ────────────────────────
  if(isElder){
    // Wrinkle lines on face
    px(ctx,hx+2,hy+2,dark); px(ctx,hx+hw-3,hy+2,dark);
    px(ctx,hx+3,hy+4,dark); px(ctx,hx+hw-4,hy+4,dark);
    // Slight grey film
    ctx.fillStyle="rgba(200,200,200,0.12)"; ctx.fillRect(0,0,W*SC,H*SC);
  }

  // ── LIFTED visual ────────────────────────────────────────────────────────
  if(isLifted){
    // Poop drop with delay
    if(t>30){
      rect(ctx,bx+Math.round(bw/2),by+bh+4+Math.min(t-30,8),3,3,"#5d4037");
      px(ctx,bx+Math.round(bw/2)+1,by+bh+3+Math.min(t-30,8),"#6d4c41");
    }
    // Grab hand above
    ctx.fillStyle="rgba(255,200,150,0.85)";
    ctx.fillRect((bx+Math.round(bw/2)-2)*SC,(by-6)*SC,6*SC,3*SC);
    for(let i=0;i<4;i++) ctx.fillRect((bx+Math.round(bw/2)-2+i)*SC,(by-7)*SC,SC,2*SC);
  }
}

function getVossLine(key) {
  const lines = VOSS[key];
  if (!lines) return null;
  const l = lines[Math.floor(Math.random()*lines.length)];
  return l; // null = intentional silence
}

function queueVoss(key) {
  const text = getVossLine(key);
  if (text === undefined) return;
  if (text === null) return; // silence
  vossQueue.push({text, key});
}

function tickVoss(nowMs) {
  const box = document.getElementById('voss-box');
  if (nowMs < vossCurrentUntil) return;
  if (vossQueue.length === 0) { box.classList.remove('visible'); return; }
  if (nowMs - vossLastFinished < 1500) return;
  const next = vossQueue.shift();
  document.getElementById('voss-text').textContent = `"${next.text}"`;
  box.classList.add('visible');
  vossCurrentUntil = nowMs + 4500;
  vossLastFinished = vossCurrentUntil;
}

function fireObs(key, data={}) {
  const ONCE_ONLY = new Set([
    "first_fire","first_baby","first_fight","first_murder","first_honey",
    "first_elder","first_building","first_theft","holy_egg","warlord",
    "first_fish","first_cook","near_water","hits_tree","near_rock",
    "two_species","elder_exile","elder_sacrifice"
  ]);
  if (ONCE_ONLY.has(key) && world.observations.has(key)) return null;
  world.observations.add(key);
  queueVoss(key);

  // Item unlocks
  const ITEM_UNLOCKS = {
    first_fire:     ["spear","hunting_bow"],
    near_water:     ["fishing_rod"],
    first_fish:     [],
    first_baby:     ["ball","party_hat"],
    hits_tree:      ["axe"],
    near_rock:      ["pickaxe"],
    first_honey:    ["honey_jar"],
    first_murder:   ["magic_ring"],
    first_fight:    ["hunting_bow"],
    first_elder:    [],
    first_building: [],
    stockpiling:    ["cookie_jar"],
    two_species:    ["flag"],
    mob_vs_one:     ["magic_ring"],
    crown_claim:    [],
  };
  const unlocks = ITEM_UNLOCKS[key] || [];
  unlocks.forEach(itemId => {
    const item = ITEMS.find(i => i.id === itemId);
    if (item && item.locked) {
      item.locked = false;
      flashObs(`🔓 ${item.name} unlocked!`);
    }
  });

  // Journal
  if (data.journalWorthy) {
    world.journal.push({key, day:world.day, gen:world.generation, data, ts:Date.now()});
  }

  return {key, data};
}

function flashObs(msg) {
  const el = document.getElementById('obs-flash');
  el.textContent = msg;
  el.classList.add('visible');
  setTimeout(() => el.classList.remove('visible'), 3000);
}

function createPetricule(genomeOverride={}, stage="baby") {
  const genome = generateGenome();
  Object.assign(genome, genomeOverride);

  // DISHBORN behavioral genome
  if (!genome.aggression)   genome.aggression   = rndInt(0,100);
  if (!genome.intelligence) genome.intelligence = rndInt(0,100);
  if (!genome.sociability)  genome.sociability  = rndInt(0,100);
  if (!genome.curiosity)    genome.curiosity    = rndInt(0,100);
  if (!genome.empathy)      genome.empathy      = rndInt(0,100);
  if (!genome.greed)        genome.greed        = rndInt(0,100);
  if (!genome.fear)         genome.fear         = rndInt(15,55);
  if (!genome.creativity)   genome.creativity   = rndInt(0,100);
  if (!genome.piety)        genome.piety        = rndInt(0,25);
  if (!genome.ambition)     genome.ambition     = rndInt(0,100);
  if (!genome.loyalty)      genome.loyalty      = rndInt(0,100);
  if (!genome.mutation_rate)genome.mutation_rate= rndInt(5,40);
  if (!genome.voiceType)    genome.voiceType    = assignVoiceType(genome.bodySizeMod, genome.bodyShape, genome.earType, genome.tailType);
  if (!genome.biomePref)    genome.biomePref    = rnd(BIOME_PREFS);

  genome.creatureCode = buildCreatureCode(genome);

  const archetypes = detectArchetypes(genome);
  const isHoly = Math.random() < 0.03;

  return {
    id: _pid++,
    genome,
    archetypes,
    isHoly,
    stage,
    stageTick: 0,
    hunger: 20 + rndInt(0,20),
    tired: 10 + rndInt(0,10),
    cold: 0,
    action: "idle",
    actionTimer: 0,
    x: 80 + Math.random() * 600,
    y: 0, // set to ground on spawn
    vx: 0, vy: 0,
    hat: null,
    heldItem: null,
    faction: null,
    killCount: 0, stealCount: 0, buildCount: 0, childCount: 0,
    _canvasEl: null, // mini canvas in sidebar
  };
}

function detectArchetypes(g) {
  const a = [];
  if (g.intelligence >= 82)                                  a.push("genius");
  if (g.intelligence <= 20)                                  a.push("dim");
  if (g.empathy <= 10 && g.greed >= 80)                     a.push("evil");
  if (g.aggression >= 78 && g.ambition >= 75)               a.push("warlord_potential");
  if (g.aggression >= 40 && g.aggression <= 62 && g.empathy >= 60) a.push("brave");
  if (g.empathy >= 80 && g.sociability >= 70)               a.push("caregiver");
  if (g.greed >= 80 && g.intelligence >= 65)                a.push("merchant");
  if (g.piety >= 65)                                         a.push("devout");
  if (g.creativity >= 80 && g.intelligence >= 60)           a.push("artist");
  if (g.ambition >= 75 && g.loyalty <= 30)                  a.push("schemer");
  if (g.fear >= 80)                                          a.push("coward");
  if (g.sociability >= 85 && g.aggression <= 30)            a.push("peacemaker");
  if (g.curiosity >= 85)                                     a.push("explorer");
  return a.length ? a : ["ordinary"];
}

// ═══════════════════════════════════════════════════════════════════
// LIFECYCLE SYSTEM
// ═══════════════════════════════════════════════════════════════════
const STAGE_TICKS = { egg:0, baby:300, teen:900, adult:3600, elder:1200 };
// egg ticks handled by egg objects separately

function tickPet(pet) {
  pet.stageTick++;
  pet.actionTimer++;

  // Needs decay (adjusted by speed already in game loop)
  pet.hunger = Math.min(100, pet.hunger + 0.06);
  pet.tired  = Math.min(100, pet.tired  + 0.03);
  if (world.isNight) pet.tired = Math.min(100, pet.tired + 0.04);

  // Cold if biome cold + night
  if ((world.biome === "tundra" || world.biome === "moon") && world.isNight) {
    pet.cold = Math.min(100, pet.cold + 0.3);
  } else {
    pet.cold = Math.max(0, pet.cold - 0.1);
  }

  // Death
  if (pet.hunger >= 100) return {died:true, cause:"starvation"};
  if (pet.cold   >= 100) return {died:true, cause:"cold"};

  // Stage advance
  const limit = STAGE_TICKS[pet.stage];
  if (limit && pet.stageTick >= limit) {
    advanceStage(pet);
  }

  // Action decision every 15 ticks
  if (pet.actionTimer >= 15) {
    pet.actionTimer = 0;
    pet.action = decidePetAction(pet);
  }

  // Movement
  movePet(pet);

  return {died:false};
}

function advanceStage(pet) {
  const next = {baby:"teen", teen:"adult", adult:"elder"}[pet.stage];
  if (!next) {
    // Elder dies
    return {died:true, cause:"old_age"};
  }
  pet.stage = next;
  pet.stageTick = 0;
  if (next === "elder" && !world.observations.has("first_elder")) {
    fireObs("first_elder", {petId:pet.id, journalWorthy:true});
  }
}

function decidePetAction(pet) {
  const g = pet.genome;
  const w = {
    foodAvail: world.resources.food > 5,
    fireNearby: world.fires.length > 0,
    threatNearby: world.population.some(p => p.id !== pet.id && p.genome.aggression > 70 && dist(p,pet) < 100),
    statuePresent: world.statues.length > 0,
  };

  if (pet.hunger > 80) return "forage";
  if (pet.tired  > 85) return "sleep";
  if (pet.cold   > 50 && !w.fireNearby) return "seek_fire";
  if (w.threatNearby && g.fear > 50) return "flee";

  // Weighted random
  const weights = {
    idle:10, wander:15, socialize:0, forage:0, fish:0,
    hunt:0, build:0, explore:0, worship:0, steal:0, sing:0,
  };
  weights.wander      += g.curiosity * 0.2;
  weights.socialize   += g.sociability * 0.25;
  weights.forage      += (pet.hunger * 0.4) + (100-w.foodAvail?20:0);
  weights.fish        += (100-g.aggression)*0.08;
  weights.hunt        += g.aggression * 0.08;
  weights.build       += g.creativity * 0.1 + g.intelligence * 0.08;
  weights.explore     += g.curiosity * 0.15;
  weights.worship     += g.piety * 0.2 * (w.statuePresent ? 2 : 1);
  weights.steal       += g.greed * 0.06 * (pet.hunger > 40 ? 1.5 : 0.5);
  weights.sing        += g.creativity * 0.04 + g.sociability * 0.04;

  if (pet.stage === "baby")   { weights.wander *= 0.2; weights.socialize += 20; }
  if (pet.stage === "elder")  { weights.wander *= 0.3; weights.worship *= 2; weights.idle += 20; }

  let total = Object.values(weights).reduce((a,b)=>a+b,0);
  let roll  = Math.random() * total;
  for (const [a,w2] of Object.entries(weights)) {
    roll -= w2;
    if (roll <= 0) return a;
  }
  return "idle";
}

const GROUND_Y = 0; // set dynamically
let groundY = 260;

function movePet(pet) {
  // Simple AI movement
  const action = pet.action;
  const speed = pet.stage === "baby" ? 0.4 : pet.stage === "elder" ? 0.5 : 0.8;

  if (action === "idle" || action === "sleep" || action === "worship") {
    pet.vx *= 0.8;
  } else if (action === "wander" || action === "explore") {
    if (Math.random() < 0.02) pet.vx = (Math.random()-0.5) * speed * 2;
  } else if (action === "flee") {
    // Move away from nearest aggressive pet
    const threat = world.population.find(p => p.id !== pet.id && p.genome.aggression > 70);
    if (threat) {
      pet.vx = (pet.x > threat.x ? 1 : -1) * speed * 1.5;
    }
  } else if (action === "socialize") {
    // Move toward nearest pet
    const near = world.population.find(p => p.id !== pet.id && dist(p,pet) > 30 && dist(p,pet) < 200);
    if (near) pet.vx = (near.x > pet.x ? 1 : -1) * speed * 0.6;
  } else {
    pet.vx += (Math.random()-0.5) * 0.3;
    pet.vx *= 0.9;
  }

  pet.x = Math.max(20, Math.min(worldW - 20, pet.x + pet.vx));
  pet.y = groundY; // always on ground (no physics yet)
}

function dist(a,b) { return Math.sqrt((a.x-b.x)**2 + (a.y-b.y)**2); }

// ═══════════════════════════════════════════════════════════════════
// EGG SYSTEM
// ═══════════════════════════════════════════════════════════════════
const EGG_HATCH_TICKS = 3600; // 1hr real time at 1x

let pendingHatch = null; // genome waiting for overlay

const EGG_DESIGNS = [
  {colors:["#c8a0f0","#9966cc"],pattern:"spots"},
  {colors:["#88ddff","#4499cc"],pattern:"stripes"},
  {colors:["#ffcc44","#ff8800"],pattern:"speckle"},
  {colors:["#ff6688","#cc3355"],pattern:"zigzag"},
  {colors:["#44ffaa","#00cc77"],pattern:"smooth"},
  {colors:["#ff9944","#cc5500"],pattern:"cracks"},
  {colors:["#cccccc","#888888"],pattern:"marble"},
  {colors:["#ff44ff","#8800cc"],pattern:"glow"},
  {colors:["#111133","#0000ff"],pattern:"void"},
  {colors:["#ffee00","#ffaa00"],pattern:"holy"},
];

function spawnEgg(genome=null, fromInventory=false) {
  const eg = {
    id: _pid++,
    genome: genome || null,
    tick: 0,
    x: 100 + Math.random() * (worldW - 200),
    y: groundY,
    design: EGG_DESIGNS[rndInt(0, EGG_DESIGNS.length-1)],
    wobble: 0,
  };
  world.eggs.push(eg);
  world.inventory.mystery_egg = Math.max(0, world.inventory.mystery_egg - (fromInventory?1:0));
  return eg;
}

function tickEggs() {
  for (let i = world.eggs.length-1; i >= 0; i--) {
    const eg = world.eggs[i];
    eg.tick++;
    if (eg.tick > EGG_HATCH_TICKS * 0.8) eg.wobble = Math.sin(Date.now()/200)*3;
    if (eg.tick >= EGG_HATCH_TICKS) {
      // HATCH!
      world.eggs.splice(i, 1);
      const newPet = createPetricule(eg.genome || {}, "baby");
      newPet.x = eg.x;
      newPet.y = groundY;
      pendingHatch = newPet;
      showHatchOverlay(newPet);
    }
  }
}

function showHatchOverlay(pet) {
  world.paused = true;
  const overlay = document.getElementById('hatch-overlay');
  overlay.classList.add('visible');

  // Draw creature on hatch canvas
  const canvas = document.getElementById('hatch-egg-canvas');
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0,0,288,288);

  // Draw at large scale — center it
  const origSC = SC;
  drawCreature(ctx, pet.genome, "baby", 0, "idle", false);

  // Name + code
  document.getElementById('hatch-name').textContent = pet.genome.name.toUpperCase();
  document.getElementById('hatch-code').textContent = pet.genome.creatureCode;

  // Archetypes
  const archEl = document.getElementById('hatch-archetypes');
  archEl.innerHTML = pet.archetypes.map(a => {
    const cls = a === 'evil' ? 'evil' : a === 'warlord_potential' ? 'evil' : pet.isHoly ? 'holy' : '';
    return `<div class="arch-tag ${cls}">${a}</div>`;
  }).join('');
  if (pet.isHoly) {
    archEl.innerHTML += '<div class="arch-tag holy">✨ HOLY ONE</div>';
    document.getElementById('hatch-subtitle').textContent = "Something is different about this one.";
    document.getElementById('hatch-subtitle').style.color = 'var(--amber)';
  }

  // Voss line
  const vossLine = pet.isHoly
    ? "Something different came out of that one."
    : pet.archetypes.includes("evil") ? null
    : pet.archetypes.includes("genius") ? "Smart one."
    : null;
  document.getElementById('hatch-voss').textContent = vossLine ? `Voss: "${vossLine}"` : "";
}

function closeHatch() {
  document.getElementById('hatch-overlay').classList.remove('visible');
  document.getElementById('hatch-subtitle').textContent = "A new petricule enters the world.";
  document.getElementById('hatch-subtitle').style.color = '';
  if (pendingHatch) {
    world.population.push(pendingHatch);
    pendingHatch = null;
    fireObs("first_baby", {journalWorthy:true});
  }
  world.paused = false;
}

// ITEM SYSTEM
// ═══════════════════════════════════════════════════════════════════
function useItemOnPet(itemId, pet) {
  const item = ITEMS.find(i => i.id === itemId);
  if (!item || item.locked) return;
  if (world.inventory[itemId] <= 0 && item.stackable) return;

  switch(itemId) {
    case "cookie":
      pet.hunger = Math.max(0, pet.hunger - 40);
      if (item.stackable) world.inventory.cookie = Math.max(0, world.inventory.cookie - 1);
      flashObs("🍪 Cookie given — hunger reduced");
      break;
    case "mystery_egg":
      // Use in world, not on pet
      break;
    case "axe":
      pet.genome._hasAxe = true;
      flashObs("🪓 Axe given — wood harvest doubled");
      fireObs("hits_tree", {petId:pet.id});
      break;
    case "fishing_rod":
      pet.genome._hasRod = true;
      flashObs("🎣 Fishing rod given — food +fishing");
      fireObs("first_fish", {petId:pet.id, journalWorthy:true});
      break;
    case "spear":
      pet.genome._hasSpear = true;
      pet.genome.aggression = Math.min(100, (pet.genome.aggression||50) + 8);
      flashObs("🗡️ Spear given — hunt power ↑ aggression ↑");
      break;
    case "hunting_bow":
      pet.genome._hasBow = true;
      flashObs("🏹 Bow given — ranged hunt unlocked");
      break;
    case "honey_jar":
      pet.genome._hasHoney = true;
      pet.genome.piety = Math.min(100, (pet.genome.piety||0) + 5);
      flashObs("🍯 Honey jar given — breeding enabled");
      fireObs("first_honey", {petId:pet.id, journalWorthy:true});
      break;
    case "crown":
      world.population.forEach(p => { p.hat = null; });
      pet.hat = "crown";
      world.leader = pet.id;
      world.politicalSystem = "monarchy";
      flashObs("👑 Crown given — monarchy begins");
      fireObs("crown_claim", {petId:pet.id, journalWorthy:true});
      break;
    case "magic_ring":
      pet.isRingWearer = true;
      flashObs("💍 Ring given — protected from mob violence");
      break;
    case "statue":
      world.statues.push({x:pet.x, y:groundY});
      flashObs("🗿 Statue placed — worship site created");
      break;
    case "ball":
      pet.genome.sociability = Math.min(100, (pet.genome.sociability||50) + 10);
      flashObs("⚽ Ball given — sociability ↑");
      break;
    case "party_hat":
      pet.hat = "party_hat";
      world.morale = Math.min(100, world.morale + 15);
      flashObs("🎉 Party hat given — morale +15");
      break;
    case "pickaxe":
      pet.genome._hasPickaxe = true;
      flashObs("⛏️ Pickaxe given — mining unlocked");
      fireObs("near_rock", {petId:pet.id});
      break;
  }
  renderItemBar();
  renderSelectedPanel();
}

// Voss auto-sends eggs
function tickVossEggs() {
  if (!world._firstEggSent && world.tick >= 300) {
    world._firstEggSent = true;
    world._lastEggTick = world.tick;
    world.inventory.mystery_egg++;
    queueVoss("voss_egg");
    flashObs("🥚 Voss sent a mystery egg!");
    renderItemBar();
  } else if (world._firstEggSent && world.tick - world._lastEggTick >= 3600) {
    world._lastEggTick = world.tick;
    world.inventory.mystery_egg++;
    renderItemBar();
  }
}

// ═══════════════════════════════════════════════════════════════════
// WORLD CANVAS RENDERING
// ═══════════════════════════════════════════════════════════════════
const worldCanvas = document.getElementById('world-canvas');
const worldCtx = worldCanvas.getContext('2d');
let worldW = 0, worldH = 0;

function resizeWorld() {
  const wrap = document.getElementById('world-canvas-wrap');
  worldW = wrap.clientWidth;
  worldH = wrap.clientHeight;
  worldCanvas.width = worldW;
  worldCanvas.height = worldH;
  groundY = worldH - 70;
}

function renderWorld() {
  worldCtx.clearRect(0, 0, worldW, worldH);

  // Stars at night
  if (world.isNight) {
    for (let i = 0; i < 60; i++) {
      const sx = (i * 137.5) % worldW;
      const sy = (i * 73.1) % (worldH * 0.6);
      const alpha = 0.3 + Math.sin(Date.now()/2000 + i) * 0.2;
      worldCtx.fillStyle = `rgba(200,200,255,${alpha})`;
      worldCtx.fillRect(sx, sy, 1, 1);
    }
  }

  // Ground
  const grad = worldCtx.createLinearGradient(0, groundY, 0, worldH);
  const gc = {
    forest:["#0d1f0a","#060d04"], tundra:["#0d1020","#050810"],
    desert:["#1a100a","#0a0604"], wasteland:["#0f1008","#060704"],
    moon:["#0a0a14","#040408"], nuclear:["#0f1404","#060804"]
  }[world.biome] || ["#0d1a0a","#060904"];
  grad.addColorStop(0, gc[0]);
  grad.addColorStop(1, gc[1]);
  worldCtx.fillStyle = grad;
  worldCtx.fillRect(0, groundY, worldW, worldH - groundY);

  // Ground line detail
  worldCtx.fillStyle = world.isNight ? "#1a1a2a" : "#222233";
  worldCtx.fillRect(0, groundY, worldW, 1);

  // Fires
  world.fires.forEach(f => drawFire(f));

  // Statues
  world.statues.forEach(s => {
    worldCtx.font = "24px serif";
    worldCtx.fillText("🗿", s.x - 12, s.y - 10);
  });

  // Buildings
  world.buildings.forEach(b => {
    worldCtx.fillStyle = "#1a1a30";
    worldCtx.strokeStyle = "#2a2a50";
    worldCtx.lineWidth = 1;
    worldCtx.strokeRect(b.x-12, b.y-20, 24, 20);
    worldCtx.fillRect(b.x-12, b.y-20, 24, 20);
  });

  // Eggs
  world.eggs.forEach(eg => drawEgg(eg));

  // Creatures
  world.population.forEach(pet => {
    if (pet.stage === "egg") return;
    const offscreenCanvas = document.createElement('canvas');
    offscreenCanvas.width = 144;
    offscreenCanvas.height = 144;
    const octx = offscreenCanvas.getContext('2d');
    const sc2 = pet.stage === "baby" ? 0.42 : pet.stage === "teen" ? 0.68 : pet.stage === "elder" ? 0.88 : 1.0;
    drawCreature(octx, pet.genome, pet.stage, _frame, pet.action, false);
    // Blit to world
    const size = 144;
    worldCtx.drawImage(offscreenCanvas, Math.round(pet.x - size/2), Math.round(pet.y - size + 8));

    // Hat
    if (pet.hat) {
      worldCtx.font = "14px serif";
      worldCtx.fillText(
        pet.hat === "crown" ? "👑" : pet.hat === "party_hat" ? "🎉" : "🎩",
        pet.x - 8, pet.y - size + 2
      );
    }

    // Holy glow
    if (pet.isHoly) {
      worldCtx.save();
      worldCtx.globalAlpha = 0.15 + Math.sin(Date.now()/600)*0.08;
      worldCtx.fillStyle = "#ffb700";
      worldCtx.beginPath();
      worldCtx.arc(pet.x, pet.y - 60, 35, 0, Math.PI*2);
      worldCtx.fill();
      worldCtx.restore();
    }

    // Selected highlight
    if (selectedPet?.id === pet.id) {
      worldCtx.strokeStyle = "rgba(57,255,20,0.5)";
      worldCtx.lineWidth = 1;
      worldCtx.setLineDash([3,3]);
      worldCtx.strokeRect(pet.x - 20, pet.y - size + 4, 40, size-8);
      worldCtx.setLineDash([]);
    }

    // Name label
    worldCtx.fillStyle = pet.isHoly ? "rgba(255,183,0,0.7)" :
                         selectedPet?.id === pet.id ? "rgba(57,255,20,0.8)" : "rgba(80,80,120,0.7)";
    worldCtx.font = "7px 'Space Mono', monospace";
    worldCtx.textAlign = "center";
    worldCtx.fillText(pet.genome.name.toUpperCase(), pet.x, pet.y - size + 0);
    worldCtx.textAlign = "left";

    // Hunger/need indicator
    if (pet.hunger > 70) {
      worldCtx.fillStyle = "rgba(255,80,80,0.8)";
      worldCtx.font = "10px serif";
      worldCtx.fillText("😰", pet.x - 5, pet.y - size - 4);
    }
    if (pet.tired > 85) {
      worldCtx.fillStyle = "rgba(100,100,200,0.8)";
      worldCtx.font = "10px serif";
      worldCtx.fillText("💤", pet.x - 5, pet.y - size - 4);
    }
  });
}

function drawEgg(eg) {
  const x = eg.x;
  const y = eg.y;
  const w = 14, h = 18;
  const wobble = eg.wobble || 0;
  worldCtx.save();
  worldCtx.translate(x, y - h/2);
  worldCtx.rotate(wobble * Math.PI/180);
  worldCtx.translate(-x, -(y - h/2));

  // Egg shape
  const [c1, c2] = eg.design.colors;
  const eg_grad = worldCtx.createRadialGradient(x-3, y-h+2, 1, x, y-h/2, h);
  eg_grad.addColorStop(0, c1);
  eg_grad.addColorStop(1, c2);
  worldCtx.fillStyle = eg_grad;
  worldCtx.beginPath();
  worldCtx.ellipse(x, y-h/2, w/2, h/2, 0, 0, Math.PI*2);
  worldCtx.fill();

  // Pattern dots
  if (eg.design.pattern === "spots" || eg.design.pattern === "speckle") {
    worldCtx.fillStyle = "rgba(0,0,0,0.25)";
    for (let i=0;i<5;i++) {
      const dx = (Math.sin(i*2.3)*w*0.3);
      const dy = (Math.cos(i*1.7)*h*0.25);
      worldCtx.beginPath();
      worldCtx.arc(x+dx, y-h/2+dy, 1.5, 0, Math.PI*2);
      worldCtx.fill();
    }
  }

  // Wobble near hatch
  if (eg.tick > eg.tick * 0.8) {
    worldCtx.strokeStyle = "rgba(255,183,0,0.4)";
    worldCtx.lineWidth = 1;
    worldCtx.beginPath();
    worldCtx.ellipse(x, y-h/2, w/2+2, h/2+2, 0, 0, Math.PI*2);
    worldCtx.stroke();
  }
  worldCtx.restore();

  // Progress indicator
  const pct = eg.tick / EGG_HATCH_TICKS;
  worldCtx.fillStyle = "rgba(57,255,20,0.3)";
  worldCtx.fillRect(x - 8, y + 2, Math.round(16 * pct), 2);
  worldCtx.strokeStyle = "rgba(57,255,20,0.15)";
  worldCtx.lineWidth = 1;
  worldCtx.strokeRect(x - 8, y + 2, 16, 2);
}

function drawFire(f) {
  const x = f.x, y = f.y;
  const flicker = Math.sin(Date.now()/150 + x)*3;
  worldCtx.fillStyle = `rgba(255,${100+Math.round(flicker*20)},0,0.8)`;
  worldCtx.beginPath();
  worldCtx.ellipse(x, y - 6 + flicker, 6, 10, 0, 0, Math.PI*2);
  worldCtx.fill();
  worldCtx.fillStyle = "rgba(255,220,0,0.6)";
  worldCtx.beginPath();
  worldCtx.ellipse(x, y - 4, 3, 6, 0, 0, Math.PI*2);
  worldCtx.fill();
  // Light glow
  const grd = worldCtx.createRadialGradient(x, y-6, 0, x, y-6, 30);
  grd.addColorStop(0, "rgba(255,140,0,0.08)");
  grd.addColorStop(1, "rgba(255,140,0,0)");
  worldCtx.fillStyle = grd;
  worldCtx.beginPath();
  worldCtx.arc(x, y-6, 30, 0, Math.PI*2);
  worldCtx.fill();
}

// Click to select creature
worldCanvas.addEventListener('click', e => {
  if (world.paused && !pendingHatch) return;
  const rect = worldCanvas.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;

  // Check if clicking on creature
  const hit = world.population.find(p => {
    const size = 144;
    return Math.abs(p.x - mx) < 24 && Math.abs((p.y - size/2) - my) < 40;
  });

  if (hit) {
    if (selectedItem) {
      useItemOnPet(selectedItem, hit);
      selectedItem = null;
      renderItemBar();
    } else {
      selectedPet = hit;
      renderSelectedPanel();
    }
  } else {
    // Place egg if mystery_egg selected
    if (selectedItem === "mystery_egg" && world.inventory.mystery_egg > 0) {
      spawnEgg(null, true);
      world.inventory.mystery_egg--;
      selectedItem = null;
      renderItemBar();
      flashObs("🥚 Egg placed — hatches in 1 hour");
    }
    selectedPet = null;
  }
});

      ${item.stackable ? `<div class="item-count ${count===0?'zero':''}">${count}</div>` : ''}
    `;
    if (!item.locked) {
      slot.onclick = () => {
        selectedItem = selectedItem === item.id ? null : item.id;
        renderItemBar();
        document.getElementById('sel-item-name').textContent = selectedItem ? item.name : "No item selected";
        document.getElementById('sel-item-desc').textContent = selectedItem ? item.desc : "Click an item, then click a creature to use it.";
        document.getElementById('sel-item-hint').textContent = selectedItem ? item.hint : "";
      };
    }
    bar.appendChild(slot);
  });
}

// ═══════════════════════════════════════════════════════════════════
// OBSERVATION TRIGGERS (checked each tick)
// ═══════════════════════════════════════════════════════════════════
function checkObservations() {
  const pop = world.population;
  if (pop.length === 0) return;

  // First fire — after 3+ adults exist for 30 ticks
  const adults = pop.filter(p => p.stage === "adult");
  if (adults.length >= 3 && world.tick % 90 === 0) {
    if (!world.observations.has("first_fire") && Math.random() < 0.3) {
      fireObs("first_fire", {journalWorthy:true});
      world.fires.push({x: 150 + Math.random()*300, y: groundY});
    }
  }

  // Warlord potential
  if (!world.observations.has("warlord")) {
    const warlord = pop.find(p => p.genome.aggression >= 78 && p.genome.ambition >= 75 && p.stage === "adult");
    if (warlord) {
      fireObs("warlord", {petId:warlord.id, journalWorthy:true});
    }
  }

  // Starvation warning
  if (world.resources.food < 10 && world.tick % 200 === 0) {
    queueVoss("starvation");
  }

  // Group chorus — 3+ high-creativity adults near each other
  if (world.tick % 300 === 0) {
    const singers = pop.filter(p => p.genome.creativity > 65 && p.stage !== "baby");
    if (singers.length >= 3) {
      fireObs("group_chorus", {journalWorthy:true});
    }
  }

  // Near water — random
  if (world.tick % 500 === 0 && !world.observations.has("near_water")) {
    const curious = pop.find(p => p.genome.curiosity > 55);
    if (curious) fireObs("near_water", {petId:curious.id});
  }

  // Elder treatment
  const elders = pop.filter(p => p.stage === "elder");
  if (elders.length > 0 && world.tick % 600 === 0) {
    const elder = elders[0];
    const avgEmpathy = pop.reduce((s,p)=>s+(p.genome.empathy||0),0)/pop.length;
    if (avgEmpathy < 30 && Math.random() < 0.2) {
      fireObs("elder_exile", {petId:elder.id, journalWorthy:true});
    }
  }

  // Resource regen
  world.resources.food = Math.min(500, world.resources.food + 0.1 * adults.length);
  if (world.tick % 1000 === 0 && Math.random() < 0.05) {
    world.resources.honey = Math.min(50, world.resources.honey + 1);
    if (world.resources.honey === 1) {
      fireObs("first_honey", {journalWorthy:true});
    }
  }
}

// ═══════════════════════════════════════════════════════════════════
// DEATH & CLEANUP
// ═══════════════════════════════════════════════════════════════════
function processDeath(pet, cause) {
  world.graves.push({name:pet.genome.name, cause, day:world.day, gen:world.generation, x:pet.x});
  if (cause === "starvation") {
    queueVoss("starvation");
    world.generationEvents.push("starvation");
  }
  if (cause === "cold") {
    queueVoss("cold_death");
  }
  if (world.population.length === 1) {
    // Last one
    fireObs("last_one", {petId:pet.id, journalWorthy:true});
    queueVoss("last_one");
    // Voss sends egg
    setTimeout(() => {
      world.inventory.mystery_egg++;
      renderItemBar();
    }, 5000);
  }
}

// ═══════════════════════════════════════════════════════════════════
// MAIN GAME LOOP
// ═══════════════════════════════════════════════════════════════════
let _ticks = 0;

function gameLoop(ts) {
  _animFrame = requestAnimationFrame(gameLoop);
  _frame = Math.floor(ts / 200) % 8;

  if (!world.paused) {
    _tickAccum += (ts - (_lastTickTime||ts)) * world.speed;
    _lastTickTime = ts;

    while (_tickAccum >= TICK_MS) {
      _tickAccum -= TICK_MS;
      gameTick();
    }
  } else {
    _lastTickTime = ts;
  }

  tickVoss(ts);
  renderWorld();
  if (_ticks % 6 === 0) {
    renderTopbar();
    renderPetList();
    if (selectedPet) renderSelectedPanel();
  }
  _ticks++;
}

function gameTick() {
  world.tick++;
  const tickInDay = 180;
  world.isNight = (world.tick % tickInDay) > tickInDay * 0.6;
  if (world.tick % tickInDay === 0) {
    world.day++;
    const seasons = ["spring","summer","autumn","winter"];
    world.season = seasons[Math.floor(world.day / 7) % 4];
  }

  // Tick all pets
  for (let i = world.population.length - 1; i >= 0; i--) {
    const pet = world.population[i];
    const result = tickPet(pet);
    if (result.died) {
      processDeath(pet, result.cause);
      world.population.splice(i, 1);
    }
  }

  // Tick eggs
  tickEggs();

  // Voss egg delivery
  tickVossEggs();

  // Observations
  if (world.tick % 10 === 0) checkObservations();

  // Morale drift
  const avgHunger = world.population.length > 0
    ? world.population.reduce((s,p)=>s+p.hunger,0)/world.population.length : 50;
  world.morale = Math.max(0, Math.min(100, world.morale - (avgHunger > 70 ? 0.5 : -0.1)));
}

// ═══════════════════════════════════════════════════════════════════
// CONTROLS
// ═══════════════════════════════════════════════════════════════════
function togglePause() {
  world.paused = !world.paused;
  document.getElementById('pause-btn').textContent = world.paused ? "▶ PLAY" : "⏸ PAUSE";
}

function setSpeed(s) {
  world.speed = s;
  document.querySelectorAll('.speed-btn').forEach(b => b.classList.remove('active'));
  const labels = {"0.5":"½×","1":"1×","3":"3×","8":"8×"};
  document.querySelectorAll('.speed-btn').forEach(b => {
    if (b.textContent === labels[String(s)]) b.classList.add('active');
  });
}

// ═══════════════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════════════
window.addEventListener('resize', () => { resizeWorld(); });

function init() {
  resizeWorld();
  renderItemBar();
  renderPetList();
  renderTopbar();
  renderSelectedPanel();

  // Start with 1 egg already incubating (given by Voss at game open)
  world.inventory.mystery_egg = 1;
  world.inventory.cookie = 8;
  renderItemBar();

  // Opening Voss message (delayed)
  setTimeout(() => queueVoss("voss_egg"), 2500);

  // Start loop
  requestAnimationFrame(gameLoop);
}

init();
</script>
